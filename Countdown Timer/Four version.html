<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Countdown Timer V3</title>
    <style>
        body {
            margin: 0;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            background-color: #f0f0f0;
            font-family: Arial, sans-serif;
        }

        .timer-container {
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-top: 50px;
        }
        
        .display {
            position: relative;
            font-size: 220px;
            font-weight: bold;
            background-color: #1a1a1a;
            color: white;
            padding: 60px 60px 60px 60px;
            border-radius: 15px;
            margin-bottom: 20px;
            min-width: 600px;
            text-align: center;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        .view-controls {
            position: absolute;
            top: 20px;
            right: 10px;
            display: flex;
            gap: 15px;
            opacity: 0;
            transition: opacity 0.3s;
        }
        
        .display:hover .view-controls { opacity: 1; }

        .view-controls button {
            width: 45px;
            height: 45px;
            background-color: rgba(51, 51, 51, 0.8);
            border: none;
            border-radius: 6px;
            color: white;
            cursor: pointer;
            font-size: 20px;
            transition: background-color 0.3s;
        }

        .controls {
            display: flex;
            gap: 15px;
        }
        
        .controls button {
            padding: 10px 25px;
            font-size: 16px;
            cursor: pointer;
            background-color: #4CAF50;
            color: white;
            border: none;
            border-radius: 6px;
            text-transform: uppercase;
            font-weight: 500;
            transition: background-color 0.3s;
        }
        
        .controls button:hover { background-color: #45a049; }

        .mirror-h { transform: scaleX(-1); }
        .mirror-v { transform: scaleY(-1); }
        .mirror-h.mirror-v { transform: scale(-1, -1); }

        :fullscreen .display {
            width: 100vw;
            height: 100vh;
            margin: 0;
            padding: 0;
        }

        :fullscreen .time-display { font-size: 40vh; }

        .time-display {
            position: relative;
            display: inline-block;
            line-height: 1;
            transition: color 0.3s;
        }

        .time-display.time-up { color: #ff0000; }

        .progress-bar {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 40px;
            border-bottom-left-radius: 15px;
            border-bottom-right-radius: 15px;
            background-color: #4CAF50;
            overflow: hidden;
        }

        .progress {
            width: 100%;
            height: 100%;
            background-color: #1a472a;
            transform: translateX(-100%);
            transition: transform 1s linear;
        }
    </style>
</head>
<body>
    <!-- 使用data-timer-duration属性设置倒计时时间（秒） -->
    <div class="timer-container" data-timer-duration="30">
        <div class="display" id="timer">
            <div class="time-display" id="timeDisplay">00:00</div>
            <div class="progress-bar">
                <div class="progress" id="progressBar"></div>
            </div>
            <div class="view-controls">
                <button onclick="toggleMirrorH()">↔️</button>
                <button onclick="toggleMirrorV()">↕️</button>
                <button onclick="toggleFullscreen()">⛶</button>
            </div>
        </div>
        <div class="controls">
            <button onclick="setTimer()">Reset</button>
            <button onclick="startTimer()">Start</button>
            <button onclick="stopTimer()">Stop</button>
        </div>
    </div>

    <script>
        // 从HTML数据属性获取倒计时时间
        const container = document.querySelector('.timer-container');
        const FIXED_TIME = parseInt(container.dataset.timerDuration) || 20;
        
        let timeLeft;
        let timerId = null;
        const display = document.getElementById('timer');
        const timeDisplay = document.getElementById('timeDisplay');
        const progressBar = document.getElementById('progressBar');

        function updateDisplay(time) {
            const minutes = Math.floor(time / 60);
            const seconds = time % 60;
            timeDisplay.textContent = `${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}`;
            
            const progress = (FIXED_TIME - time) / FIXED_TIME;
            progressBar.style.transform = `translateX(${-100 * (1 - progress)}%)`;
            
            if (time <= 0) {
                timeDisplay.classList.add('time-up');
                progressBar.style.transform = 'translateX(0)';
            } else {
                timeDisplay.classList.remove('time-up');
            }
        }

        function setTimer() {
            stopTimer();
            timeLeft = FIXED_TIME;
            timeDisplay.classList.remove('time-up');
            updateDisplay(timeLeft);
        }

        function startTimer() {
            if (timerId === null && timeLeft > 0) {
                timerId = setInterval(() => {
                    timeLeft--;
                    updateDisplay(timeLeft);
                    if (timeLeft <= 0) stopTimer();
                }, 1000);
            }
        }

        function stopTimer() {
            clearInterval(timerId);
            timerId = null;
        }

        function toggleMirrorH() {
            timeDisplay.classList.toggle('mirror-h');
        }

        function toggleMirrorV() {
            timeDisplay.classList.toggle('mirror-v');
        }

        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                display.requestFullscreen().catch(err => {
                    console.log(`Error: ${err.message}`);
                });
            } else {
                document.exitFullscreen();
            }
        }

        document.addEventListener('keydown', e => {
            if (e.key === 'Escape' && document.fullscreenElement) {
                document.exitFullscreen();
            }
        });

        window.onload = setTimer;
    </script>
</body>
</html>
