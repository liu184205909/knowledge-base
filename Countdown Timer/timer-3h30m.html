<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>3.5 Hours Countdown Timer</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="timer-container" data-timer-duration="12600">
        <div class="display" id="timer">
            <div class="time-display" id="timeDisplay">03:30:00</div>
            <div class="progress-bar">
                <div class="progress" id="progressBar"></div>
            </div>
            <div class="view-controls">
                <button onclick="toggleMirrorH()">↔️</button>
                <button onclick="toggleMirrorV()">↕️</button>
                <button onclick="toggleFullscreen()">⛶</button>
            </div>
        </div>
        <div class="controls">
            <button onclick="setTimer()">Reset</button>
            <button onclick="startTimer()">Start</button>
            <button onclick="stopTimer()">Stop</button>
        </div>
    </div>
    <script src="timer.js"></script>
</body>
</html>
